services:
  postgres:
    image: postgres:16-alpine
    container_name: tiktok_redirect_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiktok_redirect}
      POSTGRES_USER: ${POSTGRES_USER:-tiktok_redirect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiktok_redirect_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
